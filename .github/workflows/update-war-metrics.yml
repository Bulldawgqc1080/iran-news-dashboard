name: Update war metrics

on:
  schedule:
    - cron: "5 * * * *"   # hourly UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        run: node scripts/update-war-metrics.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/war-metrics.json data/sources.json
          git diff --cached --quiet || git commit -m "chore: hourly war metrics update"
          git push
