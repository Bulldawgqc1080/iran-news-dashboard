name: Update Iran News Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news fetcher
        run: python fetch_news.py

      - name: Commit and push news.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No new stories — skipping commit"
          else
            git commit -m "Auto-update news feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
